name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    # Job-level (not workflow-level) concurrency: top-level concurrency is
    # ignored when this workflow runs via workflow_call (from
    # update-scores.yml), and the job level covers every trigger path.
    concurrency:
      cancel-in-progress: true
      group: pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
